name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: [self-hosted, miu-server]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy với Docker Compose
        run: |
          docker compose down
          docker compose up -d --build

      - name: Xoá image cũ
        run: docker image prune -f
